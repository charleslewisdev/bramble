services:
  bramble:
    build: .
    container_name: bramble
    ports:
      - "3000:3000"
    volumes:
      - bramble-data:/data
    environment:
      - DATABASE_URL=/data/bramble.db
      - PHOTOS_DIR=/data/photos
      - PORT=3000
      - BRAMBLE_API_KEY=${BRAMBLE_API_KEY:-}  # brk_ API key for MCP tools to call REST API
      - PERENUAL_API_KEY=${PERENUAL_API_KEY:-}  # Optional: enables online plant search
    restart: unless-stopped

volumes:
  bramble-data:
